<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>A Tracker 设置</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <div class="section">
      <h1>外观</h1>
      <div class="theme-options">
        <button type="button" class="theme-icon-btn" data-theme="system" aria-label="跟随系统">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
            <line x1="8" y1="21" x2="16" y2="21"></line>
            <line x1="12" y1="17" x2="12" y2="21"></line>
          </svg>
        </button>
        <button type="button" class="theme-icon-btn" data-theme="dark" aria-label="夜间模式">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
        <button type="button" class="theme-icon-btn" data-theme="light" aria-label="日间模式">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
        </button>
      </div>
    </div>

    <div class="section">
      <h2>角标设置</h2>
      <div class="setting-row">
        <span class="setting-label">完整数字（关闭则缩略到 K）</span>
        <button type="button" id="badge-full-toggle" class="toggle"></button>
      </div>
      <div class="setting-row" style="margin-top: 12px;">
        <span class="setting-label">紧凑模式（一行一个品种）</span>
        <button type="button" id="compact-toggle" class="toggle"></button>
      </div>
      <div id="badge-message" class="badge-message"></div>
    </div>

    <div class="section">
      <h2>品种设置</h2>
      <p class="hint">输入 Yahoo Finance 代码即可，例如 GC=F、SI=F、HG=F、BTC-USD、ETH-USD、AAPL。点击已启用的角标开关可关闭角标。</p>

      <form id="add-form" class="add-form">
        <input type="text" id="code" placeholder="代码（如 GC=F）" required>
        <button type="submit" class="btn">添加</button>
      </form>

      <div id="message" class="message"></div>

      <table class="table">
        <thead>
          <tr>
            <th>代码</th>
            <th>Yahoo</th>
            <th>排序</th>
            <th>操作</th>
            <th>角标</th>
          </tr>
        </thead>
        <tbody id="symbol-list"></tbody>
      </table>

      <div class="actions">
        <button id="reset" class="btn btn-secondary">恢复默认</button>
      </div>
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
